<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanças</title>
    <link rel="apple-touch-icon" href="https://i.postimg.cc/jqgKv1pN/icone.jpg">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #ffffff; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; z-index: 1; }
        
        #wrapper-splash { 
            position: fixed; width: 100%; height: 100%; background: #ffffff; 
            z-index: 9999; display: flex; justify-content: center; align-items: center; 
            transition: opacity 0.5s; 
        }

        .cat-icon { 
            width: 120px; height: 120px; 
            border-radius: 50%; /* Remove a borda quadrada */
            animation: pulse-orange 1.8s infinite ease-in-out;
        }

        @keyframes pulse-orange {
            0% { transform: scale(0.9); filter: drop-shadow(0 0 0px rgba(197, 160, 40, 0)); }
            50% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(197, 160, 40, 0.5)); }
            100% { transform: scale(0.9); filter: drop-shadow(0 0 0px rgba(197, 160, 40, 0)); }
        }
    </style>
</head>
<body>
    <div id="wrapper-splash">
        <img src="https://i.postimg.cc/jqgKv1pN/icone.jpg" class="cat-icon">
    </div>

    <iframe id="app-frame" src="https://script.google.com/macros/s/AKfycbwoBnQxdVeIEsDg_i1RPe51WxLj-qeakr0Yjnu7lDbmG9tXeoHsChO0zqNlEw8K2L2nfw/exec"></iframe>

    <script>
        window.addEventListener('message', function(e) {
            if (e.data === 'appLoaded') {
                const splash = document.getElementById('wrapper-splash');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 500);
            }
        });
    </script>
</body>
</html>
